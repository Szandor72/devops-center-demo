name: Code Quality Checks

on:
  push:
    branches:
      - "*"

jobs:
  prettier-code-formatting:
    name: "Run Prettier"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3

      - name: Cache node modules
        id: cache-nodemodules
        uses: actions/cache@v2
        env:
          cache-name: cache-node-modules
        with:
          # caching node_modules
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Dependencies
        if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        run: |
          npm ci

      - name: Run pettier:check to enforce code formatting
        run: |
          npm run prettier:check
  eslint:
    runs-on: ubuntu-latest
    name: "Run Eslint"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3

      - name: Cache node modules
        id: cache-nodemodules
        uses: actions/cache@v2
        env:
          cache-name: cache-node-modules
        with:
          # caching node_modules
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Dependencies
        if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        run: |
          npm ci

      - name: Run eslint
        run: |
          npm run lint

  pmd-code-analysis:
    runs-on: ubuntu-latest
    name: "Run PMD"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3

      - name: Cache node modules
        id: cache-nodemodules
        uses: actions/cache@v2
        env:
          cache-name: cache-node-modules
        with:
          # caching node_modules
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Dependencies
        if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        run: |
          npm ci
      - name: "Run PMD Checks and fail Build"
        #  PMD CLI does not allow for several paths to be scanned
        # because a dx project could use several packageDirectories
        # (each containing Apex classes), a file list is created
        # and pmd root directory is set to project directory
        run: |
          find ${{ steps.projectname.outputs.result }} -name '*.cls' > apexClassesToScan.txt
          chmod 777 ./node_modules/pmd-bin/dist/pmd-bin/bin/run.sh
          ./node_modules/pmd-bin/dist/pmd-bin/bin/run.sh pmd -d ${{ steps.projectname.outputs.result }} -R ./.pmd/ruleset.xml --file-list apexClassesToScan.txt -f text

  commitlint:
    runs-on: ubuntu-latest
    name: "Run Commitlint"
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v5
